<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCiP-NET : REGISTRE MONDIAL DES SITES</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --primary: #c41e3a;
            /* Deep Red */
            --primary-glow: rgba(196, 30, 58, 0.4);
            --secondary: #1a1a1a;
            --accent: #2e2e2e;
            --font-main: 'Courier New', Courier, monospace;
            --font-header: 'Arial Black', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image:
                linear-gradient(rgba(196, 30, 58, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(196, 30, 58, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            background-color: var(--secondary);
            border-bottom: 3px solid var(--primary);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 10;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        h1 {
            font-family: var(--font-header);
            font-size: 1.8rem;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: bold;
            letter-spacing: 5px;
        }

        main {
            margin-top: 120px;
            padding: 20px 40px;
            min-height: 100vh;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background-color: var(--secondary);
            padding: 15px 25px;
            border: 1px solid var(--accent);
            border-left: 5px solid var(--primary);
        }

        .controls input {
            background-color: var(--bg-color);
            border: 1px solid var(--accent);
            color: var(--text-color);
            padding: 10px 15px;
            font-family: var(--font-main);
            width: 300px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .controls input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .stat-block {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            text-align: right;
        }

        .stat-value {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--secondary);
            border: 1px solid var(--accent);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--primary);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border-color: #444;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card-header {
            padding: 20px;
            border-bottom: 1px solid var(--accent);
            background-color: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            opacity: 0.8;
            filter: grayscale(100%);
            transition: filter 0.3s, opacity 0.3s;
        }

        .card:hover .card-icon {
            filter: grayscale(0%);
            opacity: 1;
        }

        .card-title {
            font-family: var(--font-header);
            font-size: 1.2rem;
            color: white;
            flex-grow: 1;
        }

        .card-class {
            font-size: 0.8rem;
            padding: 3px 8px;
            background-color: var(--bg-color);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: bold;
            white-space: nowrap;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
        }

        .location {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .location::before {
            content: "[COORD]";
            color: var(--primary);
            font-size: 0.75rem;
        }

        .description {
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: pre-wrap;
        }

        .card-footer {
            padding: 15px 20px;
            background-color: rgba(0, 0, 0, 0.3);
            border-top: 1px solid var(--accent);
            text-align: right;
            font-size: 0.8rem;
            color: #666;
        }

        .classification-tag {
            display: inline-block;
            padding: 2px 6px;
            margin: 2px;
            background: #222;
            border: 1px solid #444;
            font-size: 0.7rem;
            color: #aaa;
        }

        /* Access Modal */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(5px);
        }

        #modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--bg-color);
            width: 80%;
            max-width: 900px;
            max-height: 85vh;
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .modal-header {
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-header);
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-body {
            padding: 30px;
            overflow-y: auto;
            color: var(--text-color);
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .modal-body h2 {
            color: white;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border: 1px solid var(--secondary);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            display: block;
            margin: 0 auto;
        }

        .map-pin {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border: 1px solid #000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px var(--primary);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .map-pin:hover {
            transform: translate(-50%, -50%) scale(2);
            background-color: #fff;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--primary);
            z-index: 20;
        }

        .map-pin-label {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 0.7rem;
            font-family: var(--font-main);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            background: rgba(196, 30, 58, 0.8);
            padding: 2px 6px;
            border: 1px solid var(--primary);
            border-radius: 3px;
        }

        .map-pin:hover .map-pin-label {
            opacity: 1;
        }

        .map-container {
            width: 100%;
            margin-bottom: 30px;
            border: 1px solid var(--accent);
            background-color: var(--secondary);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .map-container::before {
            content: 'APERÇU TACTIQUE MONDIAL';
            position: absolute;
            top: 10px;
            left: 20px;
            font-family: var(--font-header);
            color: var(--primary);
            font-size: 0.9rem;
            letter-spacing: 2px;
            z-index: 5;
        }

        .world-map {
            width: 100%;
            display: block;
            height: auto;
            filter: invert(1) opacity(0.6) drop-shadow(0 0 5px var(--primary));
            transition: all 0.3s;
        }

        .world-map:hover {
            filter: invert(1) opacity(1) drop-shadow(0 0 10px var(--primary));
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-container">
            <img src="./Foundation Facilities - SCP Foundation_files/SCP_Foundation_(emblem) (1).svg" alt="SCP Logo"
                class="logo"
                onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0NSIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI1Ii8+PGNpcmNsZSBjeD0iNTAiIGN5PSI1MCIgcj0iMzAiIGZpbGw9Im5vbmUiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iMyIvPjwvc3ZnPg=='">
            <div>
                <h1>Base de données SCiP-NET</h1>
                <div class="subtitle">REGISTRE MONDIAL DES SITES // ACCÈS SÉCURISÉ</div>
            </div>
        </div>
        <div class="stat-block">
            <div class="stat-item">
                <div style="font-size: 0.7rem; color: #888;">NIVEAU D'ACCRÉDITATION</div>
                <div style="color: var(--primary); font-weight: bold;">NIVEAU 4</div>
            </div>
            <div class="stat-item">
                <div style="font-size: 0.7rem; color: #888;">STATUT DU RÉSEAU</div>
                <div style="color: #0f0; font-weight: bold;">SÉCURISÉ</div>
            </div>
        </div>
    </header>

    <main>
        <div class="map-container">
            <div class="map-wrapper">
                <img src="./Foundation Facilities - SCP Foundation_files/Map-World.png" alt="World Map"
                    class="world-map">
                <div id="map-pins-container"></div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Rechercher des sites, des lieux ou des objets...">
            <div class="stat-item" style="text-align: right;">
                <div style="font-size: 0.7rem; color: #888;">SITES EN LIGNE</div>
                <div class="stat-value" id="countDisplay">0</div>
            </div>
        </div>

        <div id="grid" class="grid">
            <div class="loading">INITIALISATION DE LA CONNEXION À LA BASE DE DONNÉES...</div>
        </div>
    </main>

    <div id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span id="modal-title">DONNÉES DU SITE</span>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modal-body">
                // DONNÉES CORROMPUES OU CLASSÉES //
            </div>
        </div>
    </div>

    <script>
        // DATA_INJECTION_POINT

        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');
        const countDisplay = document.getElementById('countDisplay');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');

        function cleanTitle(title) {
            return title.replace("Protected ", "").replace("Armed ", "").replace("Biological ", "").replace("Research and Containment ", "").replace("Containment ", "").replace("Research ", "");
        }

        function getIconForFacility(title) {
            // Attempt to guess icon based on name
            let base = "./Foundation Facilities - SCP Foundation_files/Site-";
            let numMatch = title.match(/(Site|Area)-(\d+)/i);
            if (numMatch) {
                return base + numMatch[2] + ".svg";
            }
            return "./Foundation Facilities - SCP Foundation_files/SCP_Foundation_(emblem) (1).svg";
        }

        // Filter out headers/empty elements that aren't actually facilities
        const validFacilities = facilitiesData.filter(f => f.title && f.description && f.description.length > 10 && (f.title.includes("Site") || f.title.includes("Area") || f.description.includes("Location:")));

        function renderFacilities(data) {
            grid.innerHTML = '';
            countDisplay.innerText = data.length;

            if (data.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #888;">NO FACILITIES FOUND MATCHING SEARCH CRITERIA.</div>';
                return;
            }

            data.forEach((fac, index) => {
                const card = document.createElement('div');
                card.className = 'card';

                let type = "STANDARD";
                if (fac.title.includes("Armed")) type = "ARMED";
                if (fac.title.includes("Bio")) type = "BIOLOGICAL";
                if (fac.title.includes("Protected")) type = "PROTECTED";

                // Extract location
                let loc = "REDACTED";
                let descFixed = fac.description;
                if (fac.description.startsWith("Location: ")) {
                    let parts = fac.description.split('\\n');
                    loc = parts[0].replace("Location: ", "").trim();
                    descFixed = parts.slice(1).join('\\n').trim();
                } else if (fac.description.includes("Location: ")) {
                    let locSplit = fac.description.split("Location: ")[1].split('\\n');
                    loc = locSplit[0].trim();
                }

                if (loc.includes("[DATA EXPUNGED]") || loc.includes("[DATA REDACTED]")) {
                    loc = "<span style='color: var(--primary);'>[DATA CLASSIFIED]</span>";
                }

                card.innerHTML = `
                    <div class="card-header">
                        <img src="${getIconForFacility(fac.title)}" class="card-icon" onerror="this.style.display='none'">
                        <div class="card-title">${fac.title.toUpperCase()}</div>
                        <div class="card-class">${type}</div>
                    </div>
                    <div class="card-body">
                        <div class="location">${loc}</div>
                        <div class="description">${descFixed}</div>
                    </div>
                    <div class="card-footer">
                        CLIQUER POUR VOIR LE DOSSIER
                    </div>
                `;

                card.addEventListener('click', () => openModal(fac, type, loc, descFixed));
                grid.appendChild(card);
            });
        }

        function openModal(fac, type, loc, desc) {
            modalTitle.innerText = "DOSSIER : " + fac.title.toUpperCase();

            // Format contained objects neatly if present
            let formattedDesc = desc;
            if (formattedDesc.includes("▷ Contained Objects ◁")) {
                formattedDesc = formattedDesc.replace("▷ Contained Objects ◁", "\n\n==== OBJETS CONFINÉS ====\n");
            }

            modalBody.innerHTML = `
                <h2>${fac.title}</h2>
                <div style="display: flex; gap: 20px; margin-bottom: 20px; padding: 10px; background: #111; border: 1px solid #333;">
                    <div><strong>TYPE :</strong> <span style="color:var(--primary);">${type}</span></div>
                    <div><strong>LIEU :</strong> ${loc}</div>
                </div>
                <div style="line-height: 1.8;">
                    ${formattedDesc}
                </div>
            `;
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = validFacilities.filter(f =>
                f.title.toLowerCase().includes(term) ||
                f.description.toLowerCase().includes(term)
            );
            renderFacilities(filtered);
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        function renderMapPins() {
            const container = document.getElementById('map-pins-container');
            if (!container) return;
            container.innerHTML = '';

            if (typeof mapPointsData !== 'undefined') {
                mapPointsData.forEach(point => {
                    const pin = document.createElement('div');
                    pin.className = 'map-pin';
                    pin.style.left = point.x + '%';
                    pin.style.top = point.y + '%';

                    const label = document.createElement('div');
                    label.className = 'map-pin-label';
                    label.innerText = point.name;
                    pin.appendChild(label);

                    // Link pin to facility modal if found
                    let matchName = point.name;
                    if (matchName === "S43") matchName = "43";
                    if (matchName === "S87") matchName = "87";
                    if (matchName === "S106") matchName = "106";
                    if (matchName === "S246") matchName = "246";

                    const matchingFacility = validFacilities.find(fac =>
                        fac.title.includes(matchName)
                    );

                    if (matchingFacility) {
                        pin.addEventListener('click', () => {
                            let type = "STANDARD";
                            if (matchingFacility.title.includes("Armed")) type = "ARMED";
                            if (matchingFacility.title.includes("Bio")) type = "BIOLOGICAL";
                            if (matchingFacility.title.includes("Protected")) type = "PROTECTED";

                            let loc = "REDACTED";
                            let descFixed = matchingFacility.description;
                            if (matchingFacility.description.startsWith("Location: ")) {
                                let parts = matchingFacility.description.split('\\n');
                                loc = parts[0].replace("Location: ", "").trim();
                                descFixed = parts.slice(1).join('\\n').trim();
                            } else if (matchingFacility.description.includes("Location: ")) {
                                let locSplit = matchingFacility.description.split("Location: ")[1].split('\\n');
                                loc = locSplit[0].trim();
                            }

                            openModal(matchingFacility, type, loc, descFixed);
                        });
                    }

                    container.appendChild(pin);
                });
            }
        }

        // Init
        setTimeout(() => {
            renderFacilities(validFacilities);
            renderMapPins();
        }, 500); // Small delay for aesthetic effect

    </script>
</body>

</html>
