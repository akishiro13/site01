<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCiP-NET : SITE-01 // MODULES D'INSTRUCTION CQB</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --primary: #c41e3a;
            --primary-glow: rgba(196, 30, 58, 0.4);
            --secondary: #1a1a1a;
            --accent: #2e2e2e;
            --font-main: 'Courier New', Courier, monospace;
            --font-header: 'Arial Black', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image:
                linear-gradient(rgba(196, 30, 58, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(196, 30, 58, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: -1;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            background-color: var(--secondary);
            border-bottom: 3px solid var(--primary);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 10;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
        }

        .logo {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        h1 {
            font-family: var(--font-header);
            font-size: 1.8rem;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: bold;
            letter-spacing: 5px;
        }

        main {
            margin-top: 120px;
            padding: 40px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            font-family: var(--font-header);
            border: 1px solid var(--primary);
            padding: 5px 15px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--primary);
            color: #fff;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
        }

        .page-title h2 {
            font-family: var(--font-header);
            color: var(--primary);
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }

        .image-card {
            background: var(--secondary);
            border: 1px solid var(--accent);
            padding: 20px;
            transition: border-color 0.3s;
        }

        .image-card:hover {
            border-color: var(--primary);
        }

        .image-card h3 {
            color: var(--primary);
            font-family: var(--font-header);
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        .image-card img {
            width: 100%;
            height: auto;
            border: 1px solid #333;
            background: #000;
            display: block; /* Supprime l'espace vide sous l'image */
        }

        .description {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo-container">
            <img src="./Foundation Facilities - SCP Foundation_files/Site-01.svg" alt="SCP Logo" class="logo">
            <div>
                <h1>Base de données SCiP-NET</h1>
                <div class="subtitle">SITE-01 // TACTIQUE & COMBAT</div>
            </div>
        </a>
    </header>

    <main>
        <a href="secu.html" class="back-btn">&lt; RETOUR SDS</a>

        <div class="page-title">
            <h2>MODULES D'INSTRUCTION ISTC</h2>
            <p>Combat shooting instruction - Instruction sur le tir de combat</p>
        </div>

        <div class="image-grid">
            <div class="image-card">
                <h3>REGLE 1 :</h3>
                <img src="istc/ISTC1.png" alt="Ouverture de porte CQB">
            </div>

            <div class="image-card">
                <h3>REGLE 2 :</h3>
                <img src="istc/ISTC2.png" alt="Entrée en X">
            </div>

            <div class="image-card">
                <h3>REGLE 3 :</h3>
                <img src="istc/ISTC3.png" alt="Ouverture d'angle">
            </div>

            <div class="image-card">
                <h3>REGLE 4 :</h3>
                <img src="istc/ISTC4.png" alt="Passage en Escalier">
            </div>
        </div>
    </main>
</body>

</html>
