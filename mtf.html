        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image:

                linear-gradient(90deg, rgba(196, 30, 58, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            background-color: var(--secondary);
            border-bottom: 3px solid var(--primary);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 10;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        h1 {
            font-family: var(--font-header);
            font-size: 1.8rem;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: bold;
            letter-spacing: 5px;
        }

        main {
            margin-top: 120px;
            padding: 40px;
            min-height: 100vh;
        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background-color: var(--secondary);
            padding: 15px 25px;
            border-left: 5px solid var(--primary);
        }

        .controls input {
            background-color: var(--bg-color);
            border: 1px solid var(--accent);
            color: var(--text-color);
            padding: 10px 15px;
            font-family: var(--font-main);
            width: 350px;
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .mtf-card {
            background-color: var(--secondary);
            border: 1px solid var(--accent);
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .mtf-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(196, 30, 58, 0.2);
        }

        .mtf-header {
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .mtf-logo {
            width: 50px;
            height: 50px;
            background: #222;
            border: 1px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .mtf-info h3 {
            color: #fff;
            font-family: var(--font-header);
            font-size: 1.1rem;
            margin-bottom: 2px;
        }

        .mtf-codename {
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .mtf-body {
            padding: 20px;
            flex-grow: 1;
        }

        .mtf-specialization {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .mtf-desc {
            font-size: 0.9rem;
            color: #bbb;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .mtf-footer {
            padding: 10px 20px;
            background: rgba(196, 30, 58, 0.05);
            font-size: 0.8rem;
            color: var(--primary);
            text-align: right;
            border-top: 1px solid var(--accent);
        }

        /* Modal */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: var(--bg-color);
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            border: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .modal-header {
            padding: 20px;
            background: var(--primary);
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .modal-body {
            padding: 30px;
            overflow-y: auto;
        }

        .modal-section {
            margin-bottom: 25px;
        }

        .modal-section h4 {
            color: var(--primary);
            border-bottom: 1px solid var(--primary);
            margin-bottom: 10px;
            padding-bottom: 5px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .mission-log {
            background: #111;
            padding: 15px;
            border-left: 3px solid var(--primary);
            font-style: italic;
            color: #aaa;
            margin-top: 10px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .tag {
            display: inline-block;
            background: #333;
            color: #eee;
            padding: 2px 8px;
            font-size: 0.7rem;
            border-radius: 3px;
            margin-right: 5px;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        .status-active {
            color: #0f0;
            animation: pulse 2s infinite;
        }
    </style>
</head>

        const grid = document.getElementById('mtf-grid');
        const searchInput = document.getElementById('searchInput');
        const countDisplay = document.getElementById('mtf-count');
        const modal = document.getElementById('modal-overlay');

        function renderMTF(data) {
            grid.innerHTML = '';
            countDisplay.innerText = data.length;

            data.forEach(unit => {
                const card = document.createElement('div');
                card.className = 'mtf-card';
                card.innerHTML = `
                    <div class="mtf-header">
                        <div class="mtf-logo">
                            <img src="${unit.logo}" alt="${unit.name}" 
                                 style="width:100%; height:100%; object-fit:contain;"
                                 onerror="this.parentElement.innerHTML='${unit.name[0]}'">
                        </div>
                        <div class="mtf-info">
                            <h3>FIM ${unit.name}</h3>
                            <div class="mtf-codename">"${unit.codename}"</div>
                        </div>
                    </div>
                    <div class="mtf-body">
                        <div class="mtf-specialization">${unit.specialization}</div>
                        <div class="mtf-desc">${unit.description}</div>
                        <div style="margin-top: 10px;">
                            ${unit.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                    <div class="mtf-footer">CONSULTER LE DOSSIER &gt;&gt;</div>
                `;
                card.onclick = () => openModal(unit);
                grid.appendChild(card);
            });
        }

        function openModal(unit) {
            const content = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = `DOSSIER TACTIQUE : FIM ${unit.name}`;

            content.innerHTML = `
                <div style="display:flex; gap:20px; align-items:start;">
                    <div style="width:120px; height:120px; background:#111; border:1px solid var(--primary); flex-shrink:0;">
                         <img src="${unit.logo}" alt="${unit.name}" 
                                 style="width:100%; height:100%; object-fit:contain;"
                                 onerror="this.style.display='none'">
                    </div>
                    <div>
                        <div class="modal-section">
                            <h4>Description Opérationnelle</h4>
                            <p>${unit.description}</p>
                            <p style="margin-top:10px;">${unit.details}</p>
                        </div>
                    </div>
                </div>
                <div class="modal-section">
                    <h4>Spécialisation</h4>
                    <p>${unit.specialization}</p>
                    <div style="margin-top:10px;">
                        ${unit.tags.map(tag => `<span class="tag" style="background:var(--primary);">${tag}</span>`).join('')}
                    </div>
                </div>
                <div class="modal-section">
                    <h4>Missions Notables</h4>
                    <ul style="margin-left:20px; color:#ccc;">
                        ${unit.missions.map(m => `<li>${m}</li>`).join('')}
                    </ul>
                </div>
                <div class="modal-section">
                    <h4>Journal d'Intervention</h4>
                    <div class="mission-log">
                        "En attente de déploiement tactique. Unité prête pour intervention immédiate. Statut vocal : Radio-Silence."
                    </div>
                </div>
            `;

            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        searchInput.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = mtfData.filter(u =>
                u.name.toLowerCase().includes(term) ||
                u.codename.toLowerCase().includes(term) ||
                u.specialization.toLowerCase().includes(term)
            );
            renderMTF(filtered);
        };

        window.onclick = (e) => {
            if (e.target == modal) closeModal();
        };

        // Initial render
        renderMTF(mtfData);
    </script>
